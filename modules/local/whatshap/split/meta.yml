name: "whatshap_split"
description: Splitting of the input BAM in three BAM files (haplotype 1, haplotype 2 and unassigned reads)
keywords:
  - whatshap
  - BAM
  - split
  - haplotypes
tools:
  - "whatshap":
      description: WhatsHap is a software for phasing genomic variants using DNA sequencing
        reads, also called read-based phasing or haplotype assembly.
      args_id: "$args"
      homepage: "https://whatshap.readthedocs.io"
      documentation: "https://whatshap.readthedocs.io"
      tool_dev_url: "https://github.com/whatshap/whatshap"
      doi: "10.1101/085050"
      licence: ["MIT"]
      identifier: biotools:whatshap
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'sample_1' ]
  - bam:
      type: file
      description: BAM file to be separated. Must contain the HP tags (generated by whatshap haplotag)
      pattern: "*.bam"
  - bai:
      type: file
      description: BAM file index
      pattern: "*.bai"
  - tsv:
      type: file
      description: TSV file containing the read name haplotype, phase set and chromosome of each read (generated by whatshap haplotag)
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'sample_1' ]
  - bam_h1:
      type: file
      description: Haplotype 1 BAM file
  - bam_h2:
      type: file
      description: Haplotype 2 BAM file
  - bam_unassigned:
      type: file
      description: BAM file with the reads without assigned haplotype
  - versions_whatshap:
    - - "${task.process}":
          type: string
          description: The name of the process
      - "whatshap":
          type: string
          description: The name of the tool
      - "whatshap --version":
          type: eval
          description: The expression to obtain the version of the tool
authors:
  - "@Pablo10333"
maintainers:
  - "@Pablo10333"

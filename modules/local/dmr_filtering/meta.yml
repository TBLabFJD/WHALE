name: "dmr_filtering"
description: Removal of non-interesting columns from the BED file with the differentially methylated regions. Each region is then extended 300 bp (some regions are extracted by modkit_dmr as shorter than they are)
keywords:
  - filtering
  - dmr
  - bedtools
  - awk
  - bed
tools:
  - "bedtools":
      description: "A powerful toolset for genome arithmetic."
      homepage: "https://bedtools.readthedocs.io/"
      documentation: "https://bedtools.readthedocs.io/"
      tool_dev_url: "https://github.com/arq5x/bedtools2"
      doi: "10.1093/bioinformatics/btq033"
      licence: ["MIT"]
      identifier: biotools:bedtools
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'sample_1' ]
  - bed:
      type: file
      description: BED file containing the differentially methylated regions (DMRs) generated by modkit
      pattern: "*.bed"
  - meta2:
      type: map
      description: |
        Groovy Map containing reference genome information
        e.g. [ id:'hg38' ]
  - chrom_sizes:
      type: file
      description: TSV File containing chromosome sizes for the reference genome (required for bedtools slop)
      pattern: "*.{sizes,chrom.sizes}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'sample_1' ]
  - dmr_bed:
      type: file
      description: Filtered and extended BED file containing the regions of interest
      pattern: "*_dmr.bed"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@Pablo10333"
maintainers:
  - "@Pablo10333"
name: "annotsv_tsv_filtering"
description: Filters and extracts specific columns from an AnnotSV output TSV file based on column names
keywords:
  - annotsv
  - tsv
  - filtering
  - awk
  - annotation
tools:
  - "gawk":
      description: "GNU Awk, a pattern scanning and processing language."
      homepage: "https://www.gnu.org/software/gawk/"
      documentation: "https://www.gnu.org/software/gawk/manual/"
      tool_dev_url: "https://git.savannah.gnu.org/cgit/gawk.git"
      doi: "" 
      licence: ["GPL-3.0-or-later"]
input:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'sample_1' ]
  - tsv:
      type: file
      description: TSV file generated by AnnotSV containing structural variant annotations
        (although they are Differentially Methylated Regions DMRs)
      pattern: "*.{tsv,txt}"
output:
  - meta:
      type: map
      description: |
        Groovy Map containing sample information
        e.g. [ id:'sample_1' ]
  - filtered_tsv:
      type: file
      description: Filtered TSV file containing only the selected columns
      pattern: "*_filtered.tsv"
  - versions:
      type: file
      description: File containing software versions
      pattern: "versions.yml"
authors:
  - "@pablobarbosajimenez"
maintainers:
  - "@pablobarbosajimenez"